services:
  - type: web
    name: mirrogir-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python mirror_bot_mvp.py
    envVars:
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: BOT_TOKEN
        sync: false
      - key: REQUIRED_CHANNEL
        sync: false
      - key: GROQ_API_KEY
        sync: false